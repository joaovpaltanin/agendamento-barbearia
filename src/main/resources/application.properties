server.port=9090

spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/barbearia?useTimezone=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

# Optional seed admin used to bootstrap the first login. Leave the env vars
# unset in environments where an admin already exists in the database.
barbearia.admin.cpf=${ADMIN_CPF:}
barbearia.admin.senha=${ADMIN_SENHA:}
barbearia.admin.nome=${ADMIN_NOME:Administrador}
